<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>EthiBot Nurse — CMU Nursing Ethics</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --red:#A32D2D;--red-l:#FCEBEB;--red-m:#F09595;
  --green:#27500A;--green-l:#EAF3DE;--green-m:#97C459;
  --amber:#633806;--amber-l:#FAEEDA;--amber-m:#EF9F27;
  --blue:#0C447C;--blue-l:#E6F1FB;--blue-m:#85B7EB;
  --purple:#3C3489;--purple-l:#EEEDFE;--purple-m:#AFA9EC;
  --bg:#FFFFFF;--bg2:#F7F7F5;--bg3:#F1EFE8;
  --txt:#1A1A1A;--txt2:#555552;--txt3:#888780;
  --bdr:rgba(0,0,0,0.12);--bdr2:rgba(0,0,0,0.2);
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1C1C1E;--bg2:#2C2C2E;--bg3:#3A3A3C;--txt:#F2F2F7;--txt2:#AEAEB2;--txt3:#636366;--bdr:rgba(255,255,255,0.12);--bdr2:rgba(255,255,255,0.2)}
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--txt);font-size:16px;line-height:1.5}

/* LAYOUT */
.app{max-width:600px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;padding-bottom:calc(60px + env(safe-area-inset-bottom,8px))}
.hdr{display:flex;align-items:center;gap:10px;padding:12px 16px 10px;border-bottom:0.5px solid var(--bdr);position:sticky;top:0;background:var(--bg);z-index:10}
.hdr-logo{width:38px;height:38px;border-radius:10px;background:var(--red-l);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.hdr-title{font-size:16px;font-weight:600;color:var(--txt)}
.hdr-sub{font-size:12px;color:var(--txt2)}
.lang-sw{margin-left:auto;display:flex;border:0.5px solid var(--bdr2);border-radius:8px;overflow:hidden;flex-shrink:0}
.lbtn{padding:5px 12px;font-size:14px;font-weight:500;border:none;cursor:pointer;background:var(--bg);color:var(--txt2);font-family:inherit}
.lbtn.on{background:var(--red);color:#FCEBEB}
.content{flex:1;padding:12px 16px;overflow-y:auto}

/* BOTTOM NAV — always visible */
.bot-nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:0.5px solid var(--bdr);display:flex;z-index:20;padding-bottom:env(safe-area-inset-bottom,0)}
.bot-nav-inner{max-width:600px;margin:0 auto;display:flex;width:100%}
.bnav{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;border:none;background:none;cursor:pointer;font-family:inherit;color:var(--txt3);font-size:10px;gap:2px;transition:color .15s}
.bnav-ico{font-size:22px;line-height:1}
.bnav.on{color:var(--red)}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:10px 16px 8px}
.stat{background:var(--bg2);border-radius:8px;padding:8px 4px;text-align:center}
.stat-n{font-size:18px;font-weight:600;line-height:1}
.stat-l{font-size:10px;color:var(--txt2);margin-top:3px}
.prog-row{display:flex;align-items:center;gap:10px;padding:0 16px 10px}
.prog-bg{flex:1;background:var(--bg3);border-radius:999px;height:5px;overflow:hidden}
.prog-fill{height:5px;border-radius:999px;background:var(--red);transition:width .5s}

/* CARDS */
.card{background:var(--bg);border:0.5px solid var(--bdr);border-radius:14px;overflow:hidden;margin-bottom:10px}
.dc-hdr{background:var(--red);padding:12px 16px;display:flex;align-items:center;gap:10px}
.timer-wrap{display:flex;flex-direction:column;align-items:center;padding:14px 16px 8px}
.timer-ring{position:relative;width:80px;height:80px;margin-bottom:8px}
.timer-svg{transform:rotate(-90deg)}
.timer-track{fill:none;stroke:var(--bg3);stroke-width:6}
.timer-fill{fill:none;stroke:var(--red);stroke-width:6;stroke-linecap:round;stroke-dasharray:220;stroke-dashoffset:0;transition:stroke-dashoffset .9s linear,stroke .3s}
.timer-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:600;color:var(--txt)}
.dc-sit{font-size:16px;color:var(--txt2);line-height:1.7;padding:4px 16px 10px;text-align:center}

/* CHOICES */
.choices{display:flex;flex-direction:column;gap:8px;padding:0 16px 16px}
.choice{display:flex;align-items:flex-start;gap:12px;padding:13px 14px;border-radius:12px;border:1.5px solid var(--bdr);background:var(--bg);cursor:pointer;font-family:inherit;text-align:left;width:100%;transition:all .15s;min-height:52px}
.choice:active{transform:scale(0.98)}
.ckey{width:30px;height:30px;border-radius:8px;background:var(--bg2);border:0.5px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;flex-shrink:0;color:var(--txt2)}
.ctxt{font-size:16px;color:var(--txt);line-height:1.5;flex:1;padding-top:2px}
.cico{font-size:16px;flex-shrink:0;opacity:0;padding-top:4px}
.choice.correct{border-color:#3B6D11;background:var(--green-l)}.choice.correct .ckey{background:#3B6D11;color:#fff;border-color:#3B6D11}.choice.correct .cico{opacity:1}
.choice.wrong{border-color:#E24B4A;background:var(--red-l)}.choice.wrong .ckey{background:#E24B4A;color:#fff;border-color:#E24B4A}.choice.wrong .cico{opacity:1}
.choice.partial{border-color:#BA7517;background:var(--amber-l)}.choice.partial .ckey{background:#BA7517;color:#fff;border-color:#BA7517}.choice.partial .cico{opacity:1}
.choice:disabled{cursor:default}

/* STEPS */
.steps{display:flex;border-bottom:0.5px solid var(--bdr)}
.step{flex:1;padding:8px 4px;text-align:center;font-size:11px;font-weight:500;color:var(--txt3)}
.step-dot{width:20px;height:20px;border-radius:50%;background:var(--bg2);border:0.5px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-size:11px;margin:0 auto 3px}
.step.done{color:var(--green)}.step.done .step-dot{background:var(--green-l);border-color:#3B6D11;color:var(--green)}
.step.active{color:var(--red)}.step.active .step-dot{background:var(--red-l);border-color:var(--red);color:var(--red)}

/* ANALYSIS */
.analysis{padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.result-banner{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px}
.slabel{font-size:11px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.pchip{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:10px;border:0.5px solid transparent}
.pchip.ok{background:var(--green-l);border-color:var(--green-m)}.pchip.ok .pname{color:var(--green);font-size:14px;font-weight:600}.pchip.ok .pv{color:#3B6D11}
.pchip.fail{background:var(--red-l);border-color:var(--red-m)}.pchip.fail .pname{color:var(--red);font-size:14px;font-weight:600}.pchip.fail .pv{color:var(--red)}
.pchip.conflict{background:var(--amber-l);border-color:var(--amber-m)}.pchip.conflict .pname{color:var(--amber);font-size:14px;font-weight:600}.pchip.conflict .pv{color:#854F0B}
.pv{font-size:11px;margin-top:1px}
.cflict{background:var(--amber-l);border:0.5px solid var(--amber-m);border-radius:10px;padding:10px 12px;font-size:14px;color:var(--amber);line-height:1.6}
.why-box{background:var(--bg2);border-radius:10px;padding:10px 12px;font-size:14px;color:var(--txt2);line-height:1.7}
.law-box{background:var(--blue-l);border:0.5px solid var(--blue-m);border-radius:10px;padding:10px 12px}
.law-row{font-size:14px;color:var(--blue);line-height:1.7;display:flex;gap:6px}
.law-row::before{content:"§";flex-shrink:0;opacity:.5}
.real-box{background:var(--purple-l);border:0.5px solid var(--purple-m);border-radius:10px;padding:10px 12px}
.real-item{display:flex;align-items:flex-start;gap:8px;font-size:14px;color:var(--purple);line-height:1.6;margin-bottom:4px;cursor:pointer}
.chk{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--purple-m);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .15s}
.chk.on{background:var(--purple);border-color:var(--purple);color:#fff}

/* QUIZ */
.quiz-wrap{padding:14px 16px}
.quiz-q{font-size:16px;font-weight:500;color:var(--txt);margin-bottom:12px;line-height:1.5}
.qopts{display:flex;flex-direction:column;gap:8px}
.qopt{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:12px;border:1.5px solid var(--bdr);background:var(--bg);cursor:pointer;font-family:inherit;font-size:16px;color:var(--txt);text-align:left;width:100%;transition:all .15s}
.qopt:active{transform:scale(0.98)}
.qopt.qok{border-color:#3B6D11;background:var(--green-l);color:var(--green)}
.qopt.qfail{border-color:#E24B4A;background:var(--red-l);color:var(--red)}
.quiz-fb{margin-top:10px;font-size:14px;color:var(--txt2);line-height:1.6;padding:10px 12px;border-radius:10px;background:var(--bg2)}

/* NAV ROW */
.nav-row{display:flex;gap:8px;padding:12px 16px;border-top:0.5px solid var(--bdr)}
.nbtn{flex:1;padding:12px;font-size:16px;font-weight:500;border-radius:12px;border:0.5px solid var(--bdr);background:var(--bg2);color:var(--txt2);cursor:pointer;font-family:inherit;transition:all .15s}
.nbtn:active{transform:scale(0.97)}
.nbtn.primary{background:var(--red);color:#FCEBEB;border-color:var(--red)}
.nbtn.skip{background:var(--bg2);color:var(--txt3);border-style:dashed;font-size:14px}

/* EXPLORE */
.cats{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.ctab{font-size:14px;padding:6px 14px;border-radius:999px;border:0.5px solid var(--bdr);background:var(--bg2);color:var(--txt2);cursor:pointer;font-family:inherit;transition:all .15s}
.ctab.on{background:var(--red);color:#FCEBEB;border-color:var(--red)}
.srch-box{display:flex;align-items:center;gap:8px;background:var(--bg2);border:0.5px solid var(--bdr);border-radius:12px;padding:10px 14px;margin-bottom:8px}
.srch-inp{flex:1;border:none;background:transparent;font-size:16px;font-family:inherit;color:var(--txt);outline:none}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
@media(min-width:480px){.mgrid{grid-template-columns:repeat(3,1fr)}}
.mc{background:var(--bg2);border:0.5px solid var(--bdr);border-radius:12px;padding:12px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;position:relative}
.mc:active{transform:scale(0.97)}
.mc-done{position:absolute;top:8px;right:8px;width:18px;height:18px;border-radius:50%;background:var(--green-l);border:1px solid var(--green-m);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--green)}
.mc-num{font-size:11px;color:var(--txt3);margin-bottom:3px}
.mc-ico{font-size:20px;margin-bottom:5px}
.mc-ttl{font-size:14px;font-weight:500;color:var(--txt);line-height:1.4;flex:1}
.mc-cat{font-size:10px;padding:2px 8px;border-radius:999px;margin-top:6px;display:inline-block}
.sc-sit{font-size:16px;color:var(--txt2);line-height:1.7;padding:10px 14px;background:var(--bg2);border-radius:10px;border-left:3px solid var(--red)}

/* HOME */
.home-hero{background:var(--red);border-radius:16px;padding:20px;margin-bottom:12px;color:#FCEBEB}
.home-hero-title{font-size:22px;font-weight:600;margin-bottom:4px}
.home-hero-sub{font-size:14px;opacity:.8;margin-bottom:14px}
.home-cta{background:rgba(255,255,255,0.2);border:1.5px solid rgba(255,255,255,0.4);border-radius:10px;padding:11px 20px;font-size:16px;font-weight:600;color:#FCEBEB;cursor:pointer;font-family:inherit;width:100%;transition:all .15s}
.home-cta:active{transform:scale(0.97)}
.section-title{font-size:16px;font-weight:600;color:var(--txt);margin-bottom:10px}
.cat-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.cat-card{border-radius:12px;padding:12px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:10px;border:0.5px solid transparent}
.cat-card:active{transform:scale(0.97)}
.cat-ico{font-size:24px;flex-shrink:0}
.cat-info-name{font-size:14px;font-weight:600}
.cat-info-count{font-size:11px;margin-top:1px}
.recent-list{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.recent-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg2);border-radius:10px;cursor:pointer;border:0.5px solid var(--bdr)}
.recent-item:active{transform:scale(0.98)}
.ri-ico{font-size:20px;flex-shrink:0}
.ri-ttl{font-size:14px;font-weight:500;color:var(--txt);flex:1}
.ri-cat{font-size:10px;padding:1px 7px;border-radius:999px}
.ri-arr{font-size:16px;color:var(--txt3)}
.tip-card{background:var(--blue-l);border:0.5px solid var(--blue-m);border-radius:12px;padding:12px 14px;margin-bottom:10px;font-size:14px;color:var(--blue);line-height:1.6}

/* DASHBOARD */
.kpi-g{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.kpi{background:var(--bg2);border-radius:12px;padding:12px 8px;text-align:center}
.kpi-n{font-size:22px;font-weight:600}
.kpi-l{font-size:10px;color:var(--txt2);margin-top:3px;line-height:1.3}
.bar-chart{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.bar-row{display:flex;align-items:center;gap:8px}
.bar-lbl{font-size:12px;color:var(--txt2);width:110px;flex-shrink:0;line-height:1.3}
.bar-bg{flex:1;background:var(--bg3);border-radius:999px;height:8px;overflow:hidden}
.bar-fill{height:8px;border-radius:999px;transition:width .8s}
.bar-pct{font-size:12px;color:var(--txt2);width:34px;text-align:right;flex-shrink:0}
.ins-card{border-radius:12px;padding:10px 12px;margin-bottom:8px;font-size:14px;line-height:1.65;display:flex;gap:8px}
.badge-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.badge-card{border-radius:12px;padding:10px 12px;flex:1;min-width:80px;text-align:center}
.safety{background:var(--green-l);border:0.5px solid var(--green-m);border-radius:10px;padding:8px 12px;font-size:14px;color:var(--green);margin-bottom:10px;display:flex;gap:6px}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.urgent .timer-fill{stroke:#E24B4A;animation:pulse .5s ease-in-out infinite}
.urgent .timer-num{color:#E24B4A}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="hdr-logo">🏥</div>
    <div><div class="hdr-title">EthiBot Nurse</div><div class="hdr-sub">CMU Nursing Ethics · 30 Scenarios</div></div>
    <div class="lang-sw">
      <button class="lbtn on" id="btn-th" onclick="setLang('th')">TH</button>
      <button class="lbtn" id="btn-en" onclick="setLang('en')">EN</button>
    </div>
  </div>

  <div class="content" id="main-content"></div>
</div>

<!-- BOTTOM NAV -->
<div class="bot-nav">
  <div class="bot-nav-inner">
    <button class="bnav on" id="bnav-home" onclick="switchTab('home')">
      <span class="bnav-ico">🏠</span><span id="bl-home">หน้าหลัก</span>
    </button>
    <button class="bnav" id="bnav-daily" onclick="switchTab('daily')">
      <span class="bnav-ico">🎯</span><span id="bl-daily">Daily</span>
    </button>
    <button class="bnav" id="bnav-explore" onclick="switchTab('explore')">
      <span class="bnav-ico">📚</span><span id="bl-explore">Explore</span>
    </button>
    <button class="bnav" id="bnav-dashboard" onclick="switchTab('dashboard')">
      <span class="bnav-ico">📊</span><span id="bl-dash">Dashboard</span>
    </button>
  </div>
</div>

<script>
let lang='th', curTab='home';
let timerInt=null, timerSec=60, dcPicked=null, dcDone=false, dcStep=0;
let expCat='all', expSc=null, expStep=0, expPicked=null;
const st={score:0,done:0,streak:0,ids:new Set()};

const LABELS={
  th:{home:'หน้าหลัก',daily:'Daily',explore:'Explore',dash:'Dashboard',
      sec_to_decide:'วินาทีในการตัดสินใจ',why:'ทำไม',laws:'กฎหมาย',
      correct:'ถูกต้อง!',partial:'พอใช้',wrong:'ไม่ถูกต้อง',
      retry:'ลองใหม่',back:'กลับ',menu:'เมนู',next:'ถัดไป',
      skip:'ข้าม / เปลี่ยนข้อ',decide:'ตัดสินใจ',all:'ทั้งหมด',
      tip:'💡 เคล็ดลับ: กด "ข้าม" ได้ตลอดเวลาเพื่อไปเล่นข้ออื่น',
      edu:'คำแนะนำเพื่อการศึกษาเท่านั้น',random:'สุ่ม Scenario',
      most_missed:'Scenarios ที่ตอบผิดมากที่สุด',mock:'ข้อมูลจำลองสำหรับการแสดงตัวอย่างระบบ',
      users:'คน',hero_sub:'ฝึกตัดสินใจทางจริยธรรม ผ่าน 30 สถานการณ์จริง',
      start_daily:'▶ เริ่ม Daily Challenge',browse:'เลือก Scenario ตามหมวด',
      recent:'Scenarios ล่าสุด',uphold:'ผ่าน',conflict:'ขัดแย้ง',violated:'บกพร่อง'},
  en:{home:'Home',daily:'Daily',explore:'Explore',dash:'Dashboard',
      sec_to_decide:'seconds to decide',why:'Why',laws:'Laws',
      correct:'Correct!',partial:'Partial',wrong:'Incorrect',
      retry:'Retry',back:'Back',menu:'Menu',next:'Next',
      skip:'Skip / Change Scenario',decide:'Decide',all:'All',
      tip:'💡 Tip: Tap "Skip" anytime to switch to another scenario',
      edu:'For educational purposes only',random:'Random Scenario',
      most_missed:'Most Missed Scenarios',mock:'Mock data for system demonstration',
      users:'users',hero_sub:'Practice ethical decision-making through 30 real scenarios',
      start_daily:'▶ Start Daily Challenge',browse:'Browse by Category',
      recent:'Recent Scenarios',uphold:'Upheld',conflict:'Conflict',violated:'Violated'}
};
function L(k){return LABELS[lang][k]||k;}

const CAT={
  clinical:{th:'คลินิก/วอร์ด',en:'Clinical/Ward',bg:'#E6F1FB',fg:'#0C447C',ico:'🏥'},
  digital:{th:'ดิจิทัล/โซเชียล',en:'Digital/Social',bg:'#FAEEDA',fg:'#854F0B',ico:'📱'},
  family:{th:'ญาติผู้ป่วย',en:'Patient Family',bg:'#EAF3DE',fg:'#27500A',ico:'👨‍👩‍👧'},
  team:{th:'ทีมสุขภาพ',en:'Health Team',bg:'#FCEBEB',fg:'#A32D2D',ico:'⚕️'},
  legal:{th:'กฎหมายพยาบาล',en:'Nursing Law',bg:'#EEEDFE',fg:'#3C3489',ico:'⚖️'}
};

const SC=[
  {id:1,cat:'clinical',correct:2,scores:[0,5,10],
   cn:{th:'⚡ Fidelity ✖ ป้ายโรงพยาบาล+ลักษณะแผลระบุตัวผู้ป่วยได้แม้ไม่เห็นหน้า',en:'⚡ Fidelity ✖ — hospital badge + wound pattern identifies patient even without face'},
   conflict:{au:[false,true,true],be:[false,true,true],nm:[false,true,true],ju:[true,true,true]},

const today=new Date();
const daySeed=(today.getFullYear()*1000+today.getMonth()*31+today.getDate())%SC.length;
const dailySC=SC[daySeed];

function setLang(l){
  lang=l;
  document.getElementById('btn-th').className='lbtn'+(l==='th'?' on':'');
  document.getElementById('btn-en').className='lbtn'+(l==='en'?' on':'');
  updateBotNavLabels();
  renderCurrentTab();
}
function updateBotNavLabels(){
  document.getElementById('bl-home').textContent=L('home');
  document.getElementById('bl-daily').textContent=L('daily');
  document.getElementById('bl-explore').textContent=L('explore');
  document.getElementById('bl-dash').textContent=L('dash');
}
function switchTab(t,keepExpSc){
  curTab=t;
  ['home','daily','explore','dashboard'].forEach(id=>{
    document.getElementById('bnav-'+id).classList.toggle('on',id===t);
  });
  if(t==='daily')renderDaily();
  else if(t==='explore')renderExplore();
  else if(t==='dashboard')renderDashboard();
  else renderHome();
  window.scrollTo(0,0);
}
function renderCurrentTab(){switchTab(curTab);}
function setContent(html){document.getElementById('main-content').innerHTML=html;}

function updateStats(){
  const pct=Math.round(st.done/30*100);
  const r=st.done>0?st.score/Math.max(st.done*10,1):0;
  let badge,col;
  if(st.done===0){badge='—';col='#888';}
  else if(r>=0.8){badge='🟢 Ethical';col='#27500A';}
  else if(r>=0.5){badge='🟡 Learning';col='#854F0B';}
  else{badge='🔴 Risk';col:'#A32D2D';}
}

// ── HOME ──────────────────────────────────────────────────────────
function renderHome(){
  const done=st.done,score=st.score,streak=st.streak;
  const pct=Math.round(done/30*100);
  const r=done>0?score/Math.max(done*10,1):0;
  let badge=done===0?'—':r>=0.8?'🟢 Ethical Nurse':r>=0.5?'🟡 Learning Nurse':'🔴 Risk Zone';

  let recentHTML='';
  const recent=SC.filter(s=>st.ids.has(s.id)).slice(-3).reverse();
  if(recent.length>0){
    recentHTML='<div class="section-title">'+L('recent')+'</div>'
      +'<div class="recent-list">'+recent.map(s=>{const d=lang==='th'?s.th:s.en;return'<div class="recent-item" onclick="goToScenario('+s.id+')"><div class="ri-ico">'+d.e+'</div><div class="ri-ttl">'+d.t+'</div><span class="ri-cat" style="background:'+CAT[s.cat].bg+';color:'+CAT[s.cat].fg+'">'+(lang==='th'?CAT[s.cat].th:CAT[s.cat].en)+'</span><div class="ri-arr">›</div></div>';}).join('')+'</div>';
  }

function skipToExplore(){stopTimer();switchTab('explore');}
function startTimer(){
  stopTimer();timerSec=60;updateTimerUI();
  timerInt=setInterval(()=>{timerSec--;updateTimerUI();if(timerSec<=0){stopTimer();timeUp();}},1000);
}
function stopTimer(){clearInterval(timerInt);}
function updateTimerUI(){
  const f=document.getElementById('tfill'),n=document.getElementById('tnum'),w=document.getElementById('trw');
  if(!f||!n)return;
  f.style.strokeDashoffset=220*(1-timerSec/60);
  n.textContent=timerSec;
  if(timerSec<=10){f.style.stroke='#E24B4A';n.style.color='#E24B4A';if(w)w.classList.add('urgent');}
  else if(timerSec<=20){f.style.stroke='#BA7517';n.style.color='#BA7517';}
}
function timeUp(){
  document.querySelectorAll('[id^=dc]').forEach(b=>b.disabled=true);
  setTimeout(()=>{dcStep=1;renderDaily();},1500);
}
function pickDC(idx){
  if(dcDone)return;stopTimer();dcDone=true;dcPicked=idx;
  const s=dailySC,pts=s.scores[idx],ok=idx===s.correct;
  if(ok)st.streak++;else st.streak=0;
  st.score+=pts;
  if(!st.ids.has(s.id)){st.ids.add(s.id);st.done++;}
  document.querySelectorAll('[id^=dc]').forEach((b,i)=>{
    b.disabled=true;
    if(i===s.correct)b.classList.add('correct');
    else if(i===idx&&i!==s.correct)b.classList.add(pts>0?'partial':'wrong');
  });
  setTimeout(()=>{dcStep=1;renderDaily();},1200);
}
function renderDCAnalysis(){
  const s=dailySC,d=lang==='th'?s.th:s.en,idx=dcPicked??s.correct;
  return analysisHTML(s,d,idx,'dcStep=2;renderDaily()','dcStep=1;renderDaily()');

// ── SHARED HELPERS ─────────────────────────────────────────────────
function stepBar(active){
  const names=lang==='th'?['สถานการณ์','ตัดสินใจ','วิเคราะห์','Quiz']:['Scenario','Decision','Analysis','Quiz'];
  return '<div class="steps">'+names.map((n,i)=>'<div class="step '+(i<active?'done':i===active?'active':'')+'"><div class="step-dot">'+(i<active?'✓':i+1)+'</div>'+n+'</div>').join('')+'</div>';
}
function principleChips(s,idx){
  const p=s.conflict,pn=['Autonomy','Beneficence','Non-maleficence','Justice'],pk=['au','be','nm','ju'];
  return pk.map((k,i)=>{
    const val=p[k][idx],a=p[k],hasT=a.some(v=>v),hasF=a.some(v=>!v);
    const cls=val?(hasT&&hasF?'conflict':'ok'):'fail';
    const ic=cls==='ok'?'✅':cls==='conflict'?'⚠️':'❌';
    const vd=cls==='ok'?L('uphold'):cls==='conflict'?L('conflict'):L('violated');
    return '<div class="pchip '+cls+'"><span style="font-size:16px">'+ic+'</span><div><div class="pname">'+pn[i]+'</div><div class="pv">'+vd+'</div></div></div>';
  }).join('');
}
function analysisHTML(s,d,idx,nextCmd,backCmd){
  const pts=s.scores[idx],ok=idx===s.correct,partial=pts>0&&!ok;
  const bn=ok?{bg:'#EAF3DE',ic:'✅',t:L('correct'),s:'+'+pts+'pts',c:'#27500A'}
            :partial?{bg:'#FAEEDA',ic:'⚠️',t:L('partial'),s:'+'+pts+'pts',c:'#854F0B'}
            :{bg:'#FCEBEB',ic:'❌',t:L('wrong'),s:'0pts',c:'#A32D2D'};
  return '<div class="card">'+stepBar(2)+'<div class="analysis">'
    +'<div class="result-banner" style="background:'+bn.bg+'">'
    +'<div style="font-size:26px;flex-shrink:0">'+bn.ic+'</div>'
    +'<div><div style="font-size:16px;font-weight:600;color:'+bn.c+'">'+bn.t+'</div>'
    +'<div style="font-size:14px;color:'+bn.c+'">'+bn.s+'</div></div></div>'
    +'<div><div class="slabel">💬 '+L('why')+'</div><div class="why-box">'+d.w[idx]+'</div></div>'
    +'<div><div class="slabel">⚖️ Ethical Conflict Analysis</div><div class="pgrid">'+principleChips(s,idx)+'</div></div>'
    +'<div class="cflict">'+s.cn[lang]+'</div>'
    +'<div><div class="slabel">§ '+L('laws')+'</div><div class="law-box">'+d.l.map(x=>'<div class="law-row">'+x+'</div>').join('')+'</div></div>'
    +'<div><div class="slabel">✅ Real Life</div><div class="real-box">'+d.r.map(r=>'<div class="real-item" onclick="this.querySelector(\'.chk\').classList.toggle(\'on\')"><div class="chk"></div>'+r+'</div>').join('')+'</div></div>'
    +'</div>'
    +'<div class="nav-row">'
    +(backCmd?'<button class="nbtn" onclick="'+backCmd+'">← '+L('retry')+'</button>':'')
    +'<button class="nbtn skip" onclick="startRandom();switchTab(\'explore\')">↷ '+L('skip')+'</button>'
    +'<button class="nbtn primary" onclick="'+nextCmd+'">Quiz →</button></div></div>';
}
