.dc-sit{font-size:13px;color:var(--color-text-secondary);line-height:1.7;padding:0 14px 10px;text-align:center}

.choice.partial .choice-key{background:#BA7517;color:#fff;border-color:#BA7517}

.result-icon-big{font-size:24px;flex-shrink:0}
.result-title{font-size:14px;font-weight:500}
.result-pts{font-size:12px;margin-top:2px}

.ctab{font-size:11px;padding:3px 9px;border-radius:999px;border:.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-secondary);cursor:pointer;font-family:var(--font-sans);transition:all .15s}

.dash{padding:0 0 10px}
.dash-title{font-size:13px;font-weight:500;color:var(--color-text-primary);padding:0 0 8px;display:flex;align-items:center;gap:6px}

.kpi-n{font-size:20px;font-weight:500}
.kpi-l{font-size:10px;color:var(--color-text-secondary);margin-top:2px;line-height:1.3}
.bar-chart{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.bar-row{display:flex;align-items:center;gap:8px}

.badge-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}

.badge-icon{font-size:20px;margin-bottom:4px}
.badge-name{font-size:11px;font-weight:500;margin-bottom:2px}

.safety{background:var(--green-l);border:.5px solid var(--green-m);border-radius:8px;padding:6px 10px;font-size:11px;color:var(--green);margin-bottom:8px;display:flex;gap:5px}

</style>

// Daily challenge — rotates by day seed
const today=new Date();
const daySeed=(today.getFullYear()*1000+today.getMonth()*31+today.getDate())%SC.length;
const dailySC=SC[daySeed];

function switchTab(t){
  curTab=t;
  ['daily','explore','dashboard'].forEach(id=>{
    document.getElementById('tab-'+id).style.display=id===t?'block':'none';
  });
  document.querySelectorAll('.nav-tab').forEach((el,i)=>{
    el.classList.toggle('on',['daily','explore','dashboard'][i]===t);
  });
  if(t==='daily')renderDaily();
  if(t==='explore')renderExplore();
  if(t==='dashboard')renderDashboard();
}

function setLang(l){
  lang=l;
  document.getElementById('btn-th').className='lbtn'+(l==='th'?' on':'');
  document.getElementById('btn-en').className='lbtn'+(l==='en'?' on':'');
  renderCurrentTab();
}

function renderCurrentTab(){switchTab(curTab);}

function updateStats(){
  document.getElementById('s-score').textContent=st.score;
  document.getElementById('s-done').textContent=`${st.done}/${SC.length}`;
  document.getElementById('s-streak').textContent=`${st.streak}🔥`;
  const pct=Math.round(st.done/SC.length*100);
  document.getElementById('prog').style.width=pct+'%';
  document.getElementById('prog-txt').textContent=pct+'%';
  const r=st.done>0?st.score/Math.max(st.done*10,1):0;
  let badge,col;
  if(st.done===0){badge='—';col='var(--color-text-tertiary)';}
  else if(r>=0.8){badge='🟢 Ethical';col='#27500A';}
  else if(r>=0.5){badge='🟡 Learning';col:'#854F0B';}
  else{badge='🔴 Risk Zone';col='#A32D2D';}
  document.getElementById('s-badge').innerHTML=`<div class="stat-n" style="font-size:10px;color:${col}">${badge}</div><div class="stat-l">Badge</div>`;
}

// ─── DAILY CHALLENGE ──────────────────────────────────────────────
let dcStep=0,dcPicked=null,dcDone=false;

function renderDaily(){
  const el=document.getElementById('tab-daily');
  if(dcStep===0)el.innerHTML=renderDCCard();
  else if(dcStep===1)el.innerHTML=renderDCAnalysis();
  else if(dcStep===2)el.innerHTML=renderDCQuiz();
  if(dcStep===0&&!dcDone)startTimer();
}

function renderDCCard(){
  const s=dailySC,d=lang==='th'?s.th:s.en;
  const keys=['A','B','C'];
  const now=new Date();
  const dateStr=lang==='th'?`${now.getDate()}/${now.getMonth()+1}/${now.getFullYear()+543}`:`${now.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}`;
  return`<div class="dc-card">
    <div class="dc-header">
      <span style="font-size:18px">${d.emoji}</span>
      <div class="dc-title-text">${lang==='th'?'🎯 Daily Challenge':'🎯 Daily Challenge'}</div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px">
        <span class="dc-date">${dateStr}</span>
        <span class="dc-streak-badge">🔥 ${st.streak} streak</span>
      </div>
    </div>
    <div class="timer-wrap">
      <div class="timer-ring-container" id="timer-wrap">
        <svg class="timer-svg" width="72" height="72" viewBox="0 0 72 72">
          <circle class="timer-track" cx="36" cy="36" r="32"/>
          <circle class="timer-fill" id="timer-ring" cx="36" cy="36" r="32"/>
        </svg>
        <div class="timer-num" id="timer-num">60</div>
      </div>
      <div style="font-size:11px;color:var(--color-text-tertiary)">${lang==='th'?'วินาทีในการตัดสินใจ':'seconds to decide'}</div>
    </div>
    <div style="text-align:center;margin:0 14px 6px">
      <span style="background:${CAT[s.cat].bg};color:${CAT[s.cat].fg};font-size:10px;font-weight:500;padding:2px 9px;border-radius:999px">${lang==='th'?CAT[s.cat].th:CAT[s.cat].en}</span>
    </div>
    <div class="dc-sit">${d.sit}</div>
    <div class="choices">${d.c.map((c,i)=>`<button class="choice" id="dc-c-${i}" onclick="pickDC(${i})">
      <div class="choice-key">${keys[i]}</div>
      <div class="choice-text">${c}</div>
      <div class="choice-icon">${d.icons[i]}</div>
    </button>`).join('')}</div>
  </div>
  <div class="safety">⚕ ${lang==='th'?'คำแนะนำเพื่อการศึกษาเท่านั้น':'For educational purposes only'}</div>`;
}

function startTimer(){
  stopTimer();timerSec=60;timerActive=true;
  updateTimerUI();
  timerInt=setInterval(()=>{
    timerSec--;
    updateTimerUI();
    if(timerSec<=0){stopTimer();timeUp();}
  },1000);
}
function stopTimer(){clearInterval(timerInt);timerActive=false;}
function updateTimerUI(){
  const ring=document.getElementById('timer-ring');
  const num=document.getElementById('timer-num');
  const wrap=document.getElementById('timer-wrap');
  if(!ring||!num)return;
  const pct=timerSec/60;
  ring.style.strokeDashoffset=201*(1-pct);
  num.textContent=timerSec;
  if(timerSec<=10){
    ring.style.stroke='#E24B4A';
    if(wrap)wrap.classList.add('timer-urgent');
    num.style.color='#E24B4A';
  } else if(timerSec<=20){
    ring.style.stroke='#BA7517';
    num.style.color='#BA7517';
  }
}
function timeUp(){
  document.querySelectorAll('.choice').forEach(b=>b.disabled=true);
  const d=document.getElementById('tab-daily');
  if(d){
    const fb=document.createElement('div');
    fb.style.cssText='margin:0 14px 10px;padding:10px 12px;background:#FCEBEB;border-radius:9px;font-size:13px;color:#A32D2D;text-align:center;font-weight:500';
    fb.textContent=lang==='th'?'⏰ หมดเวลา! พยาบาลต้องตัดสินใจเร็วในสถานการณ์จริง':'⏰ Time\'s up! Nurses must decide quickly in real situations.';
    const choices=d.querySelector('.choices');
    if(choices)choices.after(fb);
    setTimeout(()=>{dcStep=1;renderDaily();},2000);
  }
}

function pickDC(idx){
  if(dcDone)return;
  stopTimer();dcDone=true;dcPicked=idx;
  const s=dailySC;
  const pts=s.scores[idx];
  const ok=idx===s.correct;
  if(ok)st.streak++;else st.streak=0;
  st.score+=pts;
  if(!st.ids.has(s.id)){st.ids.add(s.id);st.done++;}
  if(!ok)st.wrongIds.add(s.id);
  updateStats();
  document.querySelectorAll('.choice').forEach((b,i)=>{
    b.disabled=true;
    if(i===s.correct)b.classList.add('correct');
    else if(i===idx&&i!==s.correct)b.classList.add(pts>0?'partial':'wrong');
  });
  setTimeout(()=>{dcStep=1;renderDaily();},1200);
}

function renderDCAnalysis(){
  const s=dailySC,d=lang==='th'?s.th:s.en;
  const idx=dcPicked??s.correct;
  const pts=s.scores[idx??0];
  const ok=idx===s.correct;
  const partial=pts>0&&!ok;
  const banner=ok?{bg:'#EAF3DE',icon:'✅',title:lang==='th'?'ถูกต้อง!':'Correct!',sub:`+${pts} pts`,tc:'#27500A'}
    :partial?{bg:'#FAEEDA',icon:'⚠️',title:lang==='th'?'พอใช้ได้':'Partial',sub:`+${pts} pts`,tc:'#854F0B'}
    :{bg:'#FCEBEB',icon:'❌',title:lang==='th'?'ไม่ถูกต้อง':'Incorrect',sub:'0 pts',tc:'#A32D2D'};
  const streakMsg=st.streak>=3?` 🔥 ${st.streak} streak!`:'';
  const p=s.conflict;
  const pNames=['Autonomy','Beneficence','Non-maleficence','Justice'];
  const pKeys=['au','be','nm','ju'];
  const pIcons={ok:'✅',fail:'❌',conflict:'⚠️'};
  const chips=pKeys.map((k,i)=>{
    const val=p[k][idx??0];
    const allVals=p[k];
    const hasT=allVals.some(v=>v),hasF=allVals.some(v=>!v);
    const cls=val?(hasT&&hasF?'conflict':'ok'):'fail';
    const icon=cls==='ok'?'✅':cls==='conflict'?'⚠️':'❌';
    const verdict=lang==='th'?(cls==='ok'?'ผ่าน':cls==='conflict'?'ขัดแย้ง':'บกพร่อง'):(cls==='ok'?'Upheld':cls==='conflict'?'Conflict':'Violated');
    return`<div class="prin-chip ${cls}"><div style="font-size:15px">${icon}</div><div><div class="prin-name">${pNames[i]}</div><div class="prin-verdict">${verdict}</div></div></div>`;
  }).join('');
  const checks=(d.real||[]).map((r,i)=>`<div class="real-item" onclick="this.querySelector('.chkbox').classList.toggle('on')"><div class="chkbox" id="rc-${i}"></div><span>${r}</span></div>`).join('');
  return`<div class="dc-card">
    <div style="padding:10px 14px 6px;border-bottom:.5px solid var(--color-border-tertiary)">
      <div style="font-size:11px;font-weight:500;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.05em">${dailySC[lang==='th'?'th':'en'].emoji} ${dailySC[lang==='th'?'th':'en'].title}</div>
    </div>
    <div class="result-banner" style="background:${banner.bg}">
      <div class="result-icon-big">${banner.icon}</div>
      <div><div class="result-title" style="color:${banner.tc}">${banner.title}${streakMsg}</div><div class="result-pts" style="color:${banner.tc}">${banner.sub}</div></div>
    </div>
    <div class="analysis-wrap">
      <div><div class="section-label">💬 ${lang==='th'?'ทำไมถึงเป็นแบบนี้':'Why this outcome'}</div>
      <div class="why-box">${d.why[idx??0]}</div></div>
      <div><div class="section-label">⚖️ Ethical Conflict Analysis</div>
      <div class="prin-grid">${chips}</div></div>
      <div class="conflict-alert">${s.conflictNote[lang]}</div>
      <div><div class="section-label">§ ${lang==='th'?'กฎหมายที่เกี่ยวข้อง':'Relevant Laws'}</div>
      <div class="law-box">${(d.laws||[]).map(l=>`<div class="law-row">${l}</div>`).join('')}</div></div>
      <div><div class="section-label">✅ ${lang==='th'?'Real Life — กาเมื่อทำแล้ว':'Real Life Actions'}</div>
      <div class="real-box">${checks}</div></div>
    </div>
    <div class="nav-row"><button class="nbtn primary" onclick="dcStep=2;renderDaily()">Quiz → </button></div>
  </div>`;
}

function renderDCQuiz(){
  const s=dailySC,d=lang==='th'?s.th:s.en;
  return`<div class="dc-card">
    <div style="padding:10px 14px 6px;border-bottom:.5px solid var(--color-border-tertiary)">
      <div style="font-size:11px;font-weight:500;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.05em">🧩 Mini Quiz</div>
    </div>
    <div class="quiz-wrap">
      <div class="quiz-q">${d.qQ}</div>
      <div class="qopts">${(d.qO||[]).map((o,i)=>`<button class="qopt" id="qq-${i}" onclick="pickDCQuiz(${i})">${String.fromCharCode(65+i)}. ${o}</button>`).join('')}</div>
      <div id="dc-qfb"></div>
    </div>
    <div class="nav-row">
      <button class="nbtn" onclick="dcDone=false;dcStep=0;dcPicked=null;renderDaily()">${lang==='th'?'↺ ลองใหม่':'↺ Retry'}</button>
      <button class="nbtn primary" onclick="switchTab('explore')">${lang==='th'?'📚 Explore All →':'📚 Explore All →'}</button>
    </div>
  </div>`;
}

function pickDCQuiz(idx){
  document.querySelectorAll('.qopt').forEach(b=>b.disabled=true);
  const d=lang==='th'?dailySC.th:dailySC.en;
  const ok=idx===d.qC;
  if(ok)st.score+=5,updateStats();
  document.getElementById('qq-'+idx).className='qopt '+(ok?'qok':'qfail');
  if(!ok)document.getElementById('qq-'+d.qC).className='qopt qok';
  const fb=document.getElementById('dc-qfb');
  if(fb){fb.className='quiz-fb';fb.textContent=ok?(lang==='th'?'✅ ถูกต้อง! +5 คะแนน':'✅ Correct! +5 pts'):(lang==='th'?`❌ คำตอบที่ถูกคือ "${d.qO[d.qC]}"`:`❌ Correct: "${d.qO[d.qC]}"`);}
}

let expCat='all',expSc=null,expStep=0,expPicked=null;

function renderExplore(){
  const el=document.getElementById('tab-explore');

function renderExpMenu(){
  const list=expCat==='all'?SC:SC.filter(s=>s.cat===expCat);
  const el=document.getElementById('tab-explore');
  const cats=['all','clinical','digital','family','team','legal'];
  el.innerHTML=`
    <div class="cat-tabs">${cats.map(c=>`<button class="ctab${expCat===c?' on':''}" onclick="setExpCat('${c}')">${c==='all'?(lang==='th'?'ทั้งหมด':'All'):lang==='th'?CAT[c].th:CAT[c].en}</button>`).join('')}</div>
    <div class="search-box"><span style="font-size:16px">🔍</span><input class="srch-inp" id="srch" placeholder="${lang==='th'?'ถาม EthiBot เช่น: โพสต์รูปคนไข้ได้ไหม?':'Ask EthiBot e.g. Can I post patient photos?'}" /><span style="font-size:11px;color:var(--color-text-tertiary)">AI</span></div>

    <div style="padding:0 14px 10px"><button class="nbtn primary" style="width:100%" onclick="startRandom()">▶ ${lang==='th'?'สุ่ม Scenario':'Random Scenario'}</button></div>`;
  const g=document.getElementById('mgrid');
  g.innerHTML=list.map(s=>{
    const d=lang==='th'?s.th:s.en;
    const done=st.ids.has(s.id);
    return`<div class="mc" onclick="pickExpSc(${s.id})">
      <div class="mc-num">#${s.id} ${done?'<span style="color:#639922">✓</span>':''}</div>
      <div style="font-size:16px;margin-bottom:4px">${d.emoji}</div>
      <div class="mc-ttl">${d.title}</div>
      <span class="mc-cat" style="background:${CAT[s.cat].bg};color:${CAT[s.cat].fg}">${lang==='th'?CAT[s.cat].th:CAT[s.cat].en}</span>
    </div>`;
  }).join('');
  document.getElementById('srch').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch(e.target.value);});
  document.getElementById('srch').addEventListener('input',e=>{if(e.target.value.length>2)doSearch(e.target.value);});
}

function setExpCat(c){expCat=c;expSc=null;renderExplore();}
function startRandom(){const pool=SC.filter(s=>!st.ids.has(s.id));pickExpSc((pool.length>0?pool:SC)[Math.floor(Math.random()*(pool.length||SC.length))].id);}
function doSearch(q){
  const lower=q.toLowerCase();
  const hits=SC.filter(s=>{const d=lang==='th'?s.th:s.en;return d.title.toLowerCase().includes(lower)||d.sit.toLowerCase().includes(lower)||s.cat.includes(lower)||(lang==='th'?CAT[s.cat].th:CAT[s.cat].en).toLowerCase().includes(lower);});
  if(hits.length>0)pickExpSc(hits[0].id);
}
function pickExpSc(id){expSc=SC.find(s=>s.id===id);expStep=0;expPicked=null;renderExplore();}

const stepNames={th:['สถานการณ์','ตัดสินใจ','วิเคราะห์','Quiz'],en:['Scenario','Decision','Analysis','Quiz']};
function stepBar(active){
  const names=stepNames[lang];
  return`<div class="steps">${names.map((n,i)=>`<div class="step ${i<active?'done':i===active?'active':''}"><div class="step-dot">${i<active?'✓':i+1}</div>${n}</div>`).join('')}</div>`;
}

  </div>`;
}

function pickExp(idx){
  expPicked=idx;
  const s=expSc,pts=s.scores[idx],ok=idx===s.correct;
  if(ok)st.streak++;else st.streak=0;
  st.score+=pts;
  if(!st.ids.has(s.id)){st.ids.add(s.id);st.done++;}
  if(!ok)st.wrongIds.add(s.id);
  updateStats();
  document.querySelectorAll('[id^=ec-]').forEach((b,i)=>{
    b.disabled=true;
    if(i===s.correct)b.classList.add('correct');
    else if(i===idx&&i!==s.correct)b.classList.add(pts>0?'partial':'wrong');
  });
  setTimeout(()=>{expStep=2;renderExplore();},900);
}

function renderExpAnalysis(){
  const s=expSc,d=lang==='th'?s.th:s.en,idx=expPicked??s.correct;
  const pts=s.scores[idx],ok=idx===s.correct,partial=pts>0&&!ok;
  const banner=ok?{bg:'#EAF3DE',icon:'✅',title:lang==='th'?'ถูกต้อง!':'Correct!',sub:`+${pts}`,tc:'#27500A'}
    :partial?{bg:'#FAEEDA',icon:'⚠️',title:lang==='th'?'พอใช้':'Partial',sub:`+${pts}`,tc:'#854F0B'}
    :{bg:'#FCEBEB',icon:'❌',title:lang==='th'?'ไม่ถูก':'Wrong',sub:'0',tc:'#A32D2D'};
  const p=s.conflict;
  const pKeys=['au','be','nm','ju'];
  const pNames=['Autonomy','Beneficence','Non-maleficence','Justice'];
  const chips=pKeys.map((k,i)=>{
    const val=p[k][idx],a=p[k],hasT=a.some(v=>v),hasF=a.some(v=>!v);
    const cls=val?(hasT&&hasF?'conflict':'ok'):'fail';
    const icon=cls==='ok'?'✅':cls==='conflict'?'⚠️':'❌';
    const vd=lang==='th'?(cls==='ok'?'ผ่าน':cls==='conflict'?'ขัดแย้ง':'บกพร่อง'):(cls==='ok'?'Upheld':cls==='conflict'?'Conflict':'Violated');
    return`<div class="prin-chip ${cls}"><div style="font-size:14px">${icon}</div><div><div class="prin-name">${pNames[i]}</div><div class="prin-verdict">${vd}</div></div></div>`;
  }).join('');
  const checks=(d.real||[]).map((r,i)=>`<div class="real-item" onclick="this.querySelector('div').classList.toggle('on')"><div class="chkbox"></div><span>${r}</span></div>`).join('');
  return`<div style="background:var(--color-background-primary);border:.5px solid var(--color-border-tertiary);border-radius:14px;overflow:hidden;margin-bottom:8px">
    ${stepBar(2)}
    <div class="result-banner" style="background:${banner.bg}">
      <div class="result-icon-big">${banner.icon}</div>
      <div><div class="result-title" style="color:${banner.tc}">${banner.title} +${banner.sub}pts${st.streak>=3?' 🔥'+st.streak+' streak!':''}</div></div>
    </div>
    <div class="analysis-wrap">
      <div><div class="section-label">💬 ${lang==='th'?'ทำไม':'Why'}</div><div class="why-box">${d.why[idx]}</div></div>
      <div><div class="section-label">⚖️ Conflict Analysis</div><div class="prin-grid">${chips}</div></div>
      <div class="conflict-alert">${s.conflictNote[lang]}</div>
      <div><div class="section-label">§ Laws</div><div class="law-box">${(d.laws||[]).map(l=>`<div class="law-row">${l}</div>`).join('')}</div></div>
      <div><div class="section-label">✅ Real Life</div><div class="real-box">${checks}</div></div>
    </div>
    <div class="nav-row">
      <button class="nbtn" onclick="expStep=1;renderExplore()">← ${lang==='th'?'ลองใหม่':'Retry'}</button>
      <button class="nbtn primary" onclick="expStep=3;renderExplore()">Quiz →</button>
    </div>
  </div>`;
}

function renderExpQuiz(){
  const s=expSc,d=lang==='th'?s.th:s.en;
  return`<div style="background:var(--color-background-primary);border:.5px solid var(--color-border-tertiary);border-radius:14px;overflow:hidden;margin-bottom:8px">
    ${stepBar(3)}
    <div class="quiz-wrap">
      <div style="font-size:11px;font-weight:500;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px">🧩 Mini Quiz</div>
      <div class="quiz-q">${d.qQ}</div>
      <div class="qopts">${(d.qO||[]).map((o,i)=>`<button class="qopt" id="eq-${i}" onclick="pickExpQuiz(${i})">${String.fromCharCode(65+i)}. ${o}</button>`).join('')}</div>
      <div id="eq-fb"></div>
    </div>
    <div class="nav-row">
      <button class="nbtn" onclick="expSc=null;renderExplore()">← ${lang==='th'?'เมนู':'Menu'}</button>
      <button class="nbtn primary" onclick="nextExpSc()">▶ ${lang==='th'?'ถัดไป':'Next'}</button>
    </div>
  </div>`;
}

function pickExpQuiz(idx){
  document.querySelectorAll('[id^=eq-]').forEach(b=>b.disabled=true);
  const d=lang==='th'?expSc.th:expSc.en,ok=idx===d.qC;
  if(ok){st.score+=5;updateStats();}
  document.getElementById('eq-'+idx).className='qopt '+(ok?'qok':'qfail');
  if(!ok)document.getElementById('eq-'+d.qC).className='qopt qok';
  const fb=document.getElementById('eq-fb');
  if(fb){fb.className='quiz-fb';fb.textContent=ok?(lang==='th'?'✅ ถูก! +5 pts':'✅ Correct! +5 pts'):(lang==='th'?`❌ คำตอบที่ถูก: "${d.qO[d.qC]}"`:`❌ Correct: "${d.qO[d.qC]}"`);}
}
function nextExpSc(){
  const pool=SC.filter(s=>!st.ids.has(s.id));
  if(pool.length>0)pickExpSc(pool[0].id);else{expSc=null;renderExplore();}
}
